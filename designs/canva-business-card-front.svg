<svg xmlns="http://www.w3.org/2000/svg" width="3.75in" height="2.25in" viewBox="0 0 1125 675">
  <title>QR Simplified business card front</title>
  <desc>Editable Canva-ready business card front with bleed area. Trim size is 3.5 by 2 inches centered inside this 3.75 by 2.25 inch artboard.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1125" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#13213a"/>
      <stop offset="1" stop-color="#0d5c63"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76f7d1"/>
      <stop offset="1" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1125" height="675" fill="url(#cardBg)"/>
  <path d="M792 -58 C918 26 962 126 1116 128 L1116 676 L618 676 C720 556 740 414 674 310 C619 223 665 26 792 -58 Z" fill="#122f42" opacity="0.78"/>
  <path d="M973 44 C1032 120 1036 206 1125 240 L1125 675 L829 675 C936 575 978 470 942 358 C909 254 888 154 973 44 Z" fill="#23c4a6" opacity="0.13"/>
  <circle cx="913" cy="143" r="108" fill="none" stroke="#76f7d1" stroke-width="2" opacity="0.35"/>
  <circle cx="936" cy="143" r="65" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.22"/>

  <g transform="translate(84 86)">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="126" height="126" rx="22" fill="#f8fafc"/>
      <g transform="translate(25 25)" fill="#111827">
        <rect x="0" y="0" width="32" height="32" rx="3"/>
        <rect x="44" y="0" width="32" height="32" rx="3"/>
        <rect x="0" y="44" width="32" height="32" rx="3"/>
        <rect x="44" y="44" width="14" height="14" rx="2"/>
        <rect x="62" y="58" width="14" height="18" rx="2"/>
        <rect x="44" y="66" width="14" height="10" rx="2"/>
        <rect x="58" y="36" width="18" height="14" rx="2"/>
        <rect x="12" y="12" width="8" height="8" rx="1" fill="#f8fafc"/>
        <rect x="56" y="12" width="8" height="8" rx="1" fill="#f8fafc"/>
        <rect x="12" y="56" width="8" height="8" rx="1" fill="#f8fafc"/>
      </g>
    </g>
    <text x="160" y="44" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700" fill="#f8fafc" letter-spacing="2">QR SIMPLIFIED</text>
    <text x="160" y="82" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="500" fill="#9eead7">Smart QR tools for modern teams</text>
  </g>

  <g transform="translate(86 366)">
    <text x="0" y="0" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="700" fill="#ffffff">Your Name</text>
    <text x="0" y="45" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#9eead7">Title / Role</text>
    <rect x="0" y="82" width="320" height="4" rx="2" fill="url(#accent)"/>
  </g>

  <g transform="translate(692 386)" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="500" fill="#e2e8f0">
    <text x="0" y="0">hello@qrsimplified.com</text>
    <text x="0" y="44">qrsimplified.com</text>
    <text x="0" y="88">(555) 123-4567</text>
  </g>

  <rect x="37.5" y="37.5" width="1050" height="600" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.16" stroke-dasharray="10 10"/>
</svg>
